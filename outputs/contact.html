    <main>
      <nav class="breadcrumbs" aria-label="パンくずリスト"><a href="index.html">ホーム</a><span>/</span><span aria-current="page">お問い合わせ</span></nav>
      <section class="page-title">
        <p class="eyebrow">Contact</p>
        <h1>お問い合わせ</h1>
        <p>広告掲載、レビュー依頼、記事内容に関するご連絡は以下のフォームからお送りください。</p>
      </section>

      <section class="section compact">
        <form class="contact-form" id="contact-form" novalidate>
          <label>
            お名前
            <input type="text" name="name" autocomplete="name" required placeholder="山田 太郎">
          </label>
          <label>
            メールアドレス
            <input type="email" name="email" autocomplete="email" required placeholder="you@example.com">
          </label>
          <label>
            お問い合わせ種別
            <select name="topic" required>
              <option value="">選択してください</option>
              <option value="ad">広告掲載について</option>
              <option value="review">レビュー依頼について</option>
              <option value="content">記事内容について</option>
              <option value="other">その他</option>
            </select>
          </label>
          <label>
            内容
            <textarea name="message" rows="7" required placeholder="お問い合わせ内容をご入力ください"></textarea>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" name="agree" required>
            <span><a href="privacy.html">プライバシーポリシー</a>に同意します</span>
          </label>
          <p class="form-message" id="form-message" role="status" aria-live="polite"></p>
          <button class="button primary" type="submit">送信する</button>
        </form>
      </section>
    </main>
